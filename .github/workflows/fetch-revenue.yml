name: Fetch Monthly Revenue

on:
  # 台灣時間每月 12 日上午 09:00 = UTC 01:00
  schedule:
    - cron: "0 1 12 * *"
  # 手動觸發備案
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Debug: dump raw MOPS HTML so we can validate the parser ──────────
      - name: Debug MOPS raw response (9921, sii, step=1)
        run: |
          python3 - <<'PYEOF'
          import requests, sys
          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          for host in ["https://mopsov.twse.com.tw", "https://mops.twse.com.tw"]:
              url = host + "/mops/web/t05st10_ifrs"
              try:
                  # Step 1: establish session cookie via GET
                  sess = requests.Session()
                  sess.headers.update({"User-Agent": UA, "Accept-Language": "zh-TW,zh;q=0.9"})
                  g = sess.get(url, timeout=20)
                  print(f"[{host}] GET status={g.status_code} cookies={dict(sess.cookies)}")

                  post_headers = {
                      "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
                      "Referer": url,
                      "X-Requested-With": "XMLHttpRequest",
                      "Accept": "text/html,*/*",
                  }
                  # Individual query for 9921 (step=1)
                  body = "encodeURIComponent=1&step=1&firstin=1&off=1&TYPEK=sii&co_id=9921&year=115&season=05"
                  r = sess.post(url, data=body.encode("utf-8"), headers=post_headers, timeout=20)
                  print(f"[{host}] step=1 status={r.status_code} len={len(r.text)}")
                  print("=== HTML snippet (first 3000 chars) ===")
                  print(r.text[:3000])
                  print("===")
                  # Batch step=0 (new session to avoid state pollution)
                  sess2 = requests.Session()
                  sess2.headers.update({"User-Agent": UA, "Accept-Language": "zh-TW,zh;q=0.9"})
                  sess2.get(url, timeout=20)
                  body2 = "encodeURIComponent=1&step=0&firstin=1&off=1&TYPEK=sii&year=&season="
                  r2 = sess2.post(url, data=body2.encode("utf-8"), headers=post_headers, timeout=30)
                  print(f"[{host}] step=0 status={r2.status_code} len={len(r2.text)}")
                  print("=== Batch HTML snippet (first 3000 chars) ===")
                  print(r2.text[:3000])
                  print("===")
                  break  # stop after first successful host
              except Exception as e:
                  print(f"[{host}] ERROR: {e}", file=sys.stderr)
          PYEOF

      # ── Main fetch ────────────────────────────────────────────────────────
      - name: Fetch revenue data
        run: python scripts/fetch_revenue.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/revenue.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MONTH=$(python -c "import json; d=json.load(open('data/revenue.json')); print(d['report_month'])")
            git commit -m "data: update revenue for ${MONTH}"
            git push origin HEAD
          fi
