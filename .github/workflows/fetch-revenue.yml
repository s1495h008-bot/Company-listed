name: Fetch Monthly Revenue

on:
  # 台灣時間每月 12 日上午 09:00 = UTC 01:00
  schedule:
    - cron: "0 1 12 * *"
  # 手動觸發備案
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Debug: test CORS proxies against TWSE/TPEx ───────────────────────
      - name: Debug proxy access to TWSE/TPEx APIs
        run: |
          python3 - <<'PYEOF'
          import requests, json, sys, urllib.parse

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          hdrs = {"User-Agent": UA, "Accept": "application/json, */*", "Accept-Language": "zh-TW,zh;q=0.9"}

          TWSE = "https://openapi.twse.com.tw/v1/opendata/t187ap05_L"
          TPEX = "https://www.tpex.org.tw/openapi/v1/t187ap05_O"

          def try_url(label, url):
              try:
                  r = requests.get(url, headers=hdrs, timeout=30)
                  print(f"  [{label}] status={r.status_code}  len={len(r.text)}")
                  if r.status_code == 200:
                      data = r.json()
                      records = data if isinstance(data, list) else data.get("data") or data.get("contents") or []
                      if isinstance(records, str):
                          records = json.loads(records)
                      print(f"  [{label}] records={len(records)}")
                      if records:
                          sample = {k.strip(): v for k, v in records[0].items()}
                          print(f"  [{label}] keys={list(sample.keys())[:6]}")
                          for rec in records:
                              code = str(rec.get("公司代號") or rec.get("CompanyID","")).strip()
                              if code == "9921":
                                  norm = {k.strip(): v for k, v in rec.items()}
                                  rev = norm.get("當月營收") or norm.get("Revenue","")
                                  print(f"  [{label}] 9921 當月營收={rev}  (expect ~5357327)")
                                  break
                          return True
              except Exception as e:
                  print(f"  [{label}] ERROR: {e}", file=sys.stderr)
              return False

          def enc(url): return urllib.parse.quote(url, safe="")

          print("=== Testing TWSE t187ap05_L ===")
          for label, url in [
              ("direct",      TWSE),
              ("corsproxy",   f"https://corsproxy.io/?url={enc(TWSE)}"),
              ("allorigins",  f"https://api.allorigins.win/raw?url={enc(TWSE)}"),
          ]:
              if try_url(label, url):
                  break

          print()
          print("=== Testing TPEx t187ap05_O ===")
          for label, url in [
              ("direct",      TPEX),
              ("corsproxy",   f"https://corsproxy.io/?url={enc(TPEX)}"),
              ("allorigins",  f"https://api.allorigins.win/raw?url={enc(TPEX)}"),
          ]:
              if try_url(label, url):
                  break
          PYEOF

      # ── Main fetch ────────────────────────────────────────────────────────
      - name: Fetch revenue data
        run: python scripts/fetch_revenue.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/revenue.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MONTH=$(python -c "import json; d=json.load(open('data/revenue.json')); print(d['report_month'])")
            git commit -m "data: update revenue for ${MONTH}"
            git push origin HEAD
          fi
