name: Fetch Monthly Revenue

on:
  # 台灣時間每天上午 09:00 = UTC 01:00
  schedule:
    - cron: "0 1 * * *"
  # 手動觸發備案
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Debug: exhaustive TPEx proxy × endpoint matrix ───────────────────
      - name: Debug TPEx proxy and endpoint matrix
        run: |
          python3 - <<'PYEOF'
          import requests, json, sys, urllib.parse

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          hdrs = {"User-Agent": UA, "Accept": "application/json, */*", "Accept-Language": "zh-TW,zh;q=0.9"}
          WATCH = {"8933", "6804", "4559", "8938", "5291"}

          def enc(u): return urllib.parse.quote(u, safe="")

          TPEX_TARGETS = [
              ("t187ap05_O", "https://www.tpex.org.tw/openapi/v1/t187ap05_O"),
              ("t187ap05_R", "https://www.tpex.org.tw/openapi/v1/t187ap05_R"),
              ("tpex_monthly_revenue", "https://www.tpex.org.tw/openapi/v1/tpex_monthly_revenue"),
          ]

          def proxy_variants(target):
              return [
                  ("direct",    target),
                  ("corsproxy", f"https://corsproxy.io/?url={enc(target)}"),
                  ("allorigins",f"https://api.allorigins.win/raw?url={enc(target)}"),
              ]

          def parse_records(raw_list):
              code_map = {}
              for rec in raw_list:
                  code = str(rec.get("公司代號") or rec.get("CompanyID","")).strip()
                  if code: code_map[code] = {k.strip(): v for k, v in rec.items()}
              return code_map

          print("=" * 60)
          print("TPEx endpoint × proxy matrix (looking for 8933 = 250,814 仟元)")
          print("=" * 60)

          best = {}
          for ep_name, target in TPEX_TARGETS:
              print(f"\n── {ep_name} ──")
              for proxy_name, url in proxy_variants(target):
                  try:
                      r = requests.get(url, headers=hdrs, timeout=30)
                      if r.status_code != 200:
                          print(f"  [{proxy_name}] HTTP {r.status_code}  body={r.text[:120]}")
                          continue
                      data = r.json()
                      recs = data if isinstance(data, list) else data.get("data") or data.get("contents") or []
                      if isinstance(recs, str): recs = json.loads(recs)
                      print(f"  [{proxy_name}] OK  records={len(recs)}  keys={list({k.strip() for k in (recs[0].keys() if recs else [])})[: 6]}")
                      if recs:
                          code_map = parse_records(recs)
                          found = WATCH & set(code_map)
                          print(f"    watch codes found: {sorted(found)}")
                          for c in sorted(found):
                              rev = code_map[c].get("當月營收") or code_map[c].get("Revenue","?")
                              print(f"    {c} 當月營收={rev}")
                              best[c] = (ep_name, proxy_name, rev)
                  except Exception as e:
                      print(f"  [{proxy_name}] ERROR: {e}")

          print(f"\n{'='*60}")
          print(f"Best source for each watch code:")
          for code in sorted(WATCH):
              if code in best:
                  ep, px, rev = best[code]
                  print(f"  {code}: {ep} via {px}  當月營收={rev}")
              else:
                  print(f"  {code}: NOT FOUND in any TPEx endpoint/proxy")
          PYEOF

      # ── Debug: can we scrape Yahoo Finance revenue page? ─────────────────
      - name: Debug Yahoo Finance revenue page (8933)
        run: |
          python3 - <<'PYEOF'
          import requests, sys

          TARGET = "https://tw.stock.yahoo.com/quote/8933/revenue"
          NEEDLE = "250,814"   # 8933 愛地雅 2026/05 當月營收（仟元）
          UA_BROWSER = (
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/124.0.0.0 Safari/537.36"
          )

          for ua_label, ua in [
              ("browser-UA", UA_BROWSER),
              ("python-requests", "python-requests/2.31"),
          ]:
              print(f"\n── {ua_label} ──")
              try:
                  r = requests.get(TARGET, headers={
                      "User-Agent": ua,
                      "Accept": "text/html,application/xhtml+xml,*/*;q=0.9",
                      "Accept-Language": "zh-TW,zh;q=0.9",
                  }, timeout=20, allow_redirects=True)
                  print(f"status={r.status_code}  final_url={r.url}  len={len(r.text)}")
                  snippet = r.text[:2000]
                  print("─── first 2000 chars ───")
                  print(snippet)
                  print("─── end snippet ───")
                  found = NEEDLE in r.text
                  print(f"Contains '{NEEDLE}': {found}")
                  if found:
                      idx = r.text.index(NEEDLE)
                      print(f"Context: ...{r.text[max(0,idx-80):idx+80]}...")
              except Exception as e:
                  print(f"ERROR: {e}", file=sys.stderr)
          PYEOF

      # ── Main fetch ────────────────────────────────────────────────────────
      - name: Fetch revenue data
        run: python scripts/fetch_revenue.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage if at least one company has real revenue data (guard against empty runs)
          HAS_DATA=$(python -c "
          import json
          d = json.load(open('data/revenue.json'))
          ok = [c for c in d.get('companies',[]) if 'revenue_month' in c and c['revenue_month'] is not None]
          print(len(ok))
          ")
          echo "Companies with data: ${HAS_DATA}"
          if [ "${HAS_DATA}" = "0" ]; then
            echo "Fetch returned 0 companies with data — skipping commit to preserve existing cache."
            exit 0
          fi
          git add data/revenue.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MONTH=$(python -c "import json; d=json.load(open('data/revenue.json')); print(d['report_month'])")
            git commit -m "data: update revenue for ${MONTH}"
            git push origin HEAD
          fi
