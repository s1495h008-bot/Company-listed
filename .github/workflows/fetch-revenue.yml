name: Fetch Monthly Revenue

on:
  # 台灣時間每月 12 日上午 09:00 = UTC 01:00
  schedule:
    - cron: "0 1 12 * *"
  # 手動觸發備案
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Debug: test proxy access + find missing companies ────────────────
      - name: Debug proxy access and find missing companies
        run: |
          python3 - <<'PYEOF'
          import requests, json, sys, urllib.parse

          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          hdrs = {"User-Agent": UA, "Accept": "application/json, */*", "Accept-Language": "zh-TW,zh;q=0.9"}
          WATCH = {"8933","6804","4559","8938","5291"}  # companies still missing

          def enc(u): return urllib.parse.quote(u, safe="")

          def fetch_records(target):
              """Try corsproxy then allorigins then direct; return (records, proxy_used)."""
              for label, url in [
                  ("corsproxy",  f"https://corsproxy.io/?url={enc(target)}"),
                  ("allorigins", f"https://api.allorigins.win/raw?url={enc(target)}"),
                  ("direct",     target),
              ]:
                  try:
                      r = requests.get(url, headers=hdrs, timeout=30)
                      if r.status_code != 200:
                          print(f"  [{label}] status={r.status_code}", file=sys.stderr)
                          continue
                      data = r.json()
                      recs = data if isinstance(data, list) else data.get("data") or data.get("contents") or []
                      if isinstance(recs, str): recs = json.loads(recs)
                      if recs:
                          return recs, label
                      print(f"  [{label}] empty response", file=sys.stderr)
                  except Exception as e:
                      print(f"  [{label}] {e}", file=sys.stderr)
              return [], "none"

          def check_endpoint(name, target):
              print(f"\n=== {name} ===")
              recs, via = fetch_records(target)
              if not recs:
                  print(f"  FAILED — no data from any proxy")
                  return {}
              sample = {k.strip(): v for k, v in recs[0].items()}
              print(f"  via={via}  records={len(recs)}  keys={list(sample.keys())[:6]}")
              code_map = {}
              for rec in recs:
                  code = str(rec.get("公司代號") or rec.get("CompanyID","")).strip()
                  if code: code_map[code] = rec
              found = WATCH & set(code_map)
              missing = WATCH - set(code_map)
              print(f"  watch codes FOUND: {sorted(found)}")
              print(f"  watch codes MISSING: {sorted(missing)}")
              for c in sorted(found):
                  norm = {k.strip(): v for k, v in code_map[c].items()}
                  rev = norm.get("當月營收") or norm.get("Revenue","")
                  print(f"    {c} 當月營收={rev}")
              if "9921" in code_map:
                  norm = {k.strip(): v for k, v in code_map["9921"].items()}
                  print(f"  9921 當月營收={norm.get('當月營收','')}  (expect ~5357327)")
              return code_map

          all_found = {}
          all_found.update(check_endpoint("TWSE t187ap05_L (上市)",  "https://openapi.twse.com.tw/v1/opendata/t187ap05_L"))
          all_found.update(check_endpoint("TWSE t187ap05_R (上市興櫃)", "https://openapi.twse.com.tw/v1/opendata/t187ap05_R"))
          all_found.update(check_endpoint("TPEx t187ap05_O (上櫃)",  "https://www.tpex.org.tw/openapi/v1/t187ap05_O"))
          all_found.update(check_endpoint("TPEx t187ap05_R (興櫃)",  "https://www.tpex.org.tw/openapi/v1/t187ap05_R"))
          all_found.update(check_endpoint("TPEx tpex_monthly_revenue", "https://www.tpex.org.tw/openapi/v1/tpex_monthly_revenue"))

          print(f"\n=== Summary ===")
          still_missing = WATCH - set(all_found)
          print(f"watch codes found across all endpoints: {sorted(WATCH & set(all_found))}")
          print(f"watch codes NOT found anywhere: {sorted(still_missing)}")
          PYEOF

      # ── Main fetch ────────────────────────────────────────────────────────
      - name: Fetch revenue data
        run: python scripts/fetch_revenue.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/revenue.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MONTH=$(python -c "import json; d=json.load(open('data/revenue.json')); print(d['report_month'])")
            git commit -m "data: update revenue for ${MONTH}"
            git push origin HEAD
          fi
