name: Fetch Monthly Revenue

on:
  # 台灣時間每月 12 日上午 09:00 = UTC 01:00
  schedule:
    - cron: "0 1 12 * *"
  # 手動觸發備案
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # ── Debug: validate both OpenAPI endpoints ───────────────────────────
      - name: Debug API responses (TWSE + TPEx)
        run: |
          python3 - <<'PYEOF'
          import requests, json, sys
          from datetime import datetime, timezone, timedelta

          TW_TZ = timezone(timedelta(hours=8))
          now   = datetime.now(TW_TZ)
          rev_m = now.month - 1 if now.month > 1 else 12
          rev_y = now.year      if now.month > 1 else now.year - 1
          roc_y = rev_y - 1911
          yearmonth = f"{roc_y}{rev_m:02d}"
          UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          hdrs = {"User-Agent": UA, "Accept": "application/json, */*"}

          # ── TWSE (上市) ──────────────────────────────────────────────────────
          print("=== TWSE OpenAPI ===")
          try:
              r = requests.get("https://openapi.twse.com.tw/v1/opendata/t187ap03_L",
                               headers=hdrs, timeout=30)
              print(f"status={r.status_code}  len={len(r.text)}")
              data = r.json()
              print(f"records: {len(data)}")
              if data:
                  sample = {k.strip(): v for k, v in data[0].items()}
                  print(f"keys: {list(sample.keys())}")
                  # Find 9921
                  for rec in data:
                      if rec.get("公司代號","").strip() == "9921":
                          print(f"9921 record: { {k.strip():v for k,v in rec.items()} }")
                          break
          except Exception as e:
              print(f"ERROR: {e}", file=sys.stderr)

          print()

          # ── TPEx (上櫃) ──────────────────────────────────────────────────────
          print("=== TPEx OpenAPI ===")
          for params in [{"yearmonth": yearmonth}, None]:
              try:
                  r2 = requests.get("https://www.tpex.org.tw/openapi/v1/tpex_monthly_revenue",
                                    params=params, headers=hdrs, timeout=30)
                  print(f"params={params}  status={r2.status_code}  len={len(r2.text)}")
                  data2 = r2.json()
                  records = data2 if isinstance(data2, list) else data2.get("data", [])
                  print(f"records: {len(records)}")
                  if records:
                      sample2 = {k.strip(): v for k, v in records[0].items()}
                      print(f"keys: {list(sample2.keys())}")
                      # Find 8933
                      for rec in records:
                          norm = {k.strip(): v for k, v in rec.items()}
                          code = norm.get("CompanyID") or norm.get("公司代號","")
                          if str(code).strip() == "8933":
                              print(f"8933 record: {norm}")
                              break
                      break
              except Exception as e:
                  print(f"params={params}  ERROR: {e}", file=sys.stderr)
          PYEOF

      # ── Main fetch ────────────────────────────────────────────────────────
      - name: Fetch revenue data
        run: python scripts/fetch_revenue.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/revenue.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            MONTH=$(python -c "import json; d=json.load(open('data/revenue.json')); print(d['report_month'])")
            git commit -m "data: update revenue for ${MONTH}"
            git push origin HEAD
          fi
